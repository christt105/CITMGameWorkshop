name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build slide decks with Marp
        run: |
          mkdir -p _site
          for f in slides/dia-*.md; do
            name=$(basename "$f" .md)
            npx --yes @marp-team/marp-cli@latest "$f" -o "_site/$name.html" --html --allow-local-files
          done
          cp slides/index.html _site/index.html
          cp slides/viewer.html _site/viewer.html
          cp flappy-bird/GUIA.md _site/flappy-bird-guia.md
          cp flappy-bird/FUNCIONS.md _site/flappy-bird-funcions.md
          cp platformer-3d/GUIA.md _site/platformer-guia.md
          cp platformer-3d/MECANIQUES.md _site/platformer-mecaniques.md
          [ -d slides/img ] && cp -r slides/img _site/img || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
