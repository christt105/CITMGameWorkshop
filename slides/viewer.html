<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guia de Videojocs — CITM·UPC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body {
    background-color: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 24px;
    line-height: 1.6;
  }
  .wrap { max-width: 800px; margin: 0 auto; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #38bdf8;
    text-decoration: none;
    font-size: 0.95rem;
    margin-bottom: 24px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .back-link:hover { opacity: 0.8; }
  .markdown-body {
    background-color: #1e293b !important;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  }
  @media (max-width: 640px) {
    body { padding: 12px; }
    .markdown-body { padding: 16px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="back-link">← Tornar a l'inici</a>
    <article id="content" class="markdown-body">
      Carregant contingut...
    </article>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const guideKey = params.get('g') || 'flappy-bird-guia';

    const guides = {
      'flappy-bird-guia': 'flappy-bird-guia.md',
      'flappy-bird-funcions': 'flappy-bird-funcions.md',
      'flappy-bird-professor': 'flappy-bird-professor.md',
      'platformer-guia': 'platformer-guia.md',
      'platformer-mecaniques': 'platformer-mecaniques.md'
    };

    const mdFile = guides[guideKey];
    if (mdFile) {
      fetch(mdFile)
        .then(res => {
          if (!res.ok) throw new Error('No s\'ha pogut carregar la guia.');
          return res.text();
        })
        .then(text => {
          document.getElementById('content').innerHTML = marked.parse(text);
          const firstLine = text.trim().split('\n')[0];
          if (firstLine.startsWith('#')) {
            document.title = firstLine.replace('#', '').trim() + ' — CITM·UPC';
          }
        })
        .catch(err => {
          document.getElementById('content').innerHTML = `<h1>Error</h1><p>${err.message}</p>`;
        });
    } else {
      document.getElementById('content').innerHTML = `<h1>Error</h1><p>La guia demanada no existeix.</p>`;
    }
  </script>
</body>
</html>
